<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Face -->
  <circle cx="16" cy="16" r="14" fill="#1a1a1a" stroke="#555" stroke-width="1.5"/>
  <!-- Hour hand (pointing ~2) -->
  <line x1="16" y1="16" x2="23" y2="10" stroke="#f0f0f0" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Minute hand (pointing ~10) -->
  <line x1="16" y1="16" x2="10" y2="9" stroke="#f0f0f0" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="1.5" fill="#f0f0f0"/>
</svg>
