<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Current Time</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <div class="card">
      <div id="time" class="time">--:--:--</div>
      <div id="date" class="date">---</div>
      <div id="timezone" class="timezone">---</div>
      <div id="time-warning" class="warning"></div>
    </div>

    <form id="track-form" class="track-form">
      <input type="text" id="track-label" placeholder="Label" required />
      <input type="text" id="track-value" placeholder="Value (+/-)" required />
      <button type="submit">Save</button>
    </form>

    <section id="tracked-data" class="tracked-data"></section>
  </main>
  <div class="info-btn" aria-label="Time sync info">
    <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/>
      <rect x="7.25" y="7" width="1.5" height="5" rx="0.75" fill="currentColor"/>
      <circle cx="8" cy="4.5" r="0.85" fill="currentColor"/>
    </svg>
    <div class="info-tooltip">
      <div class="info-tooltip-title">Clock drift</div>
      <div id="drift-value">Checking…</div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
